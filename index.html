<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vương Quốc Tin Học 6 - v5.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <main class="home-screen">
    <section class="home-stage" aria-label="Trang chủ Vương Quốc Tin Học 6">
      <!-- LỚP 1: NỀN TRANG CHỦ -->
      <img src="images/home-cover.png" class="home-bg" alt="Nền Vương Quốc Tin Học 6">

      <!-- LỚP 2: LOGO TRUNG TÂM -->
      <div class="logo-glow"></div>
      <img src="images/main-logo.png" class="main-logo" alt="Vương Quốc Tin Học 6">

      <!-- LỚP HIỆU ỨNG -->
      <div class="home-stars"></div>
      <div class="home-glow"></div>

      <a class="home-btn btn-start" href="login.html?redirect=ban-do-17-tram.html" data-title="Bắt đầu hành trình">
        <img src="images/btn-start.png" alt="Bắt đầu hành trình">
        <span class="spark"></span>
      </a>

      <a class="home-btn btn-map" href="login.html?redirect=ban-do-17-tram.html" data-title="Bản đồ học tập">
        <img src="images/btn-map.png" alt="Bản đồ học tập">
        <span class="spark"></span>
      </a>

      <a class="home-btn btn-rank" href="login.html?redirect=bang-vang-hoc-sinh.html" data-title="Bảng vàng học sinh">
        <img src="images/btn-rank.png" alt="Bảng vàng học sinh">
        <span class="spark"></span>
      </a>

      <a class="home-btn btn-badge" href="login.html?redirect=kho-huy-hieu.html" data-title="Kho huy hiệu">
        <img src="images/btn-badge.png" alt="Kho huy hiệu">
        <span class="spark"></span>
      </a>

      <a class="home-btn btn-product" href="login.html?redirect=goc-san-pham-hoc-sinh.html" data-title="Góc sản phẩm học sinh">
        <img src="images/btn-product.png" alt="Góc sản phẩm học sinh">
        <span class="spark"></span>
      </a>
    </section>
  </main>

  <script src="api-config.js"></script>
  <script src="music-player.js"></script>
</body>
</html>
